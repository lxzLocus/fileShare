services:
  fileshare:
    # ローカルでビルドする場合: docker compose up --build
    build: .
    # GitHub Container Registry のイメージを使う場合は build をコメントアウトして↓を有効化
    # image: ghcr.io/OWNER/fileshare:latest
    container_name: fileshare
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/app/data
      - TZ=Asia/Tokyo
    volumes:
      # アップロードファイルとメタDBを永続化（コンテナを作り直しても残る）
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/files').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
  """_summary_
  """